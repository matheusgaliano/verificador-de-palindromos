<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Verificador de Palíndromos</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #f4f4f9;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .resultado {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Verificador de Palíndromos</h1>
        <p>Desenvolvedor Matheus Galiano</p>

        <form method="POST">
            <input type="text" name="palavra" placeholder="Digite algo..." value="{{ texto_digitado }}">
            <button type="submit">Verificar</button>
        </form>

        {% if resultado %}
        <div class="resultado">{{ resultado }}</div>
        {% endif %}
    </div>
</body>

</html>
